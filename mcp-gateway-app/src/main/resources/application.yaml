server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: mcp-guardian
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ==========================================
# MCP Guardian Configuration
# ==========================================
guardian:
  proxy:
    connect-timeout-ms: ${GUARDIAN_CONNECT_TIMEOUT:5000}
    read-timeout-ms: ${GUARDIAN_READ_TIMEOUT:30000}

  # Downstream MCP Server Registry
  servers:
    db-tools:
      name: "Database Tools Server"
      url: ${GUARDIAN_DB_TOOLS_URL:http://localhost:3001}
      health-check-url: ${GUARDIAN_DB_TOOLS_HEALTH_URL:http://localhost:3001/health}
      enabled: ${GUARDIAN_DB_TOOLS_ENABLED:true}
    file-tools:
      name: "File System Tools Server"
      url: ${GUARDIAN_FILE_TOOLS_URL:http://localhost:3002}
      health-check-url: ${GUARDIAN_FILE_TOOLS_HEALTH_URL:http://localhost:3002/health}
      enabled: ${GUARDIAN_FILE_TOOLS_ENABLED:true}
    code-tools:
      name: "Code Analysis Tools Server"
      url: ${GUARDIAN_CODE_TOOLS_URL:http://localhost:3003}
      health-check-url: ${GUARDIAN_CODE_TOOLS_HEALTH_URL:http://localhost:3003/health}
      enabled: ${GUARDIAN_CODE_TOOLS_ENABLED:false}

  # JWT Authentication
  jwt:
    secret: ${JWT_SECRET:mcp-guardian-default-secret-key-change-in-production-min-32-bytes}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    header: Authorization
    prefix: "Bearer "

  # Policy Engine Rules
  policy:
    default-action: ${GUARDIAN_POLICY_DEFAULT_ACTION:ALLOW}
    rules:
      - name: "block-destructive-sql"
        description: "Block DROP/TRUNCATE commands for non-admin users"
        action: DENY
        methods:
          - "tools/call"
        keywords:
          - "drop"
          - "truncate"
          - "delete from"
        exempt-roles:
          - "admin"
          - "dba"

      - name: "block-file-delete"
        description: "Block file deletion tools"
        action: DENY
        methods:
          - "tools/call"
        keywords:
          - "delete_file"
          - "rm -rf"
          - "remove_directory"
        exempt-roles:
          - "admin"

# Logging
logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","logger":"%c","thread":"%t","message":"%replace(%m){"\"","\\\""}"}%n'
  level:
    root: ${LOG_LEVEL:INFO}
    com.guardian: ${GUARDIAN_LOG_LEVEL:DEBUG}
    AUDIT: INFO

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
